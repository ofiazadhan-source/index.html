<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - DHAN SIOMAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:15px;}
.header {
  background:linear-gradient(135deg, #ff6b35, #ff4500);
  color:white; padding:20px; border-radius:15px; margin-bottom:20px;
  text-align:center; position:relative;
}
.logout-btn {
  position:absolute; right:15px; top:15px; background:white; color:#ff6b35;
  border:none; padding:8px 15px; border-radius:8px; font-weight:700;
  cursor:pointer;
}
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;
}
.stat-card {
  padding:15px; border-radius:12px; text-align:center; color:white;
}
.stat-card.green {background:#4caf50;}
.stat-card.red {background:#f44336;}
.stat-card.blue {background:#2196f3;}
.stat-card h3 {font-size:24px; margin-top:5px;}
.section {
  background:white; border-radius:12px; padding:15px; margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.section h3 {color:#ff6b35; margin-bottom:15px;}
button {
  background:#ff6b35; color:white; border:none; padding:12px 20px;
  border-radius:8px; font-weight:700; cursor:pointer; margin:5px;
}
button:hover {background:#ff4500;}
input, select {
  width:100%; padding:10px; margin:8px 0; border:1px solid #ddd;
  border-radius:8px; font-size:14px;
}
table {width:100%; border-collapse:collapse;}
th, td {padding:10px; text-align:left; border-bottom:1px solid #eee;}
th {background:#ff6b35; color:white;}
</style>
</head>
<body>

<div class="header">
  <h2>⚙️ Admin Dashboard</h2>
  <p>Manage Stock, Price, Sales & Expenses</p>
  <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
</div>

<div class="stats-grid">
  <div class="stat-card green">
    <div>Total Sales</div>
    <h3>₱<span id="totalSales">0</span></h3>
  </div>
  <div class="stat-card red">
    <div>Expenses</div>
    <h3>₱<span id="totalExpenses">0</span></h3>
  </div>
  <div class="stat-card blue">
    <div>Net Profit</div>
    <h3>₱<span id="netProfit">0</span></h3>
  </div>
</div>

<div class="section">
  <h3>📦 Add Stock</h3>
  <select id="stockItem"></select>
  <input type="number" id="stockQty" placeholder="Enter quantity" min="1">
  <button onclick="addStock()">Add Stock</button>
</div>

<div class="section">
  <h3>💰 Price Management</h3>
  <select id="priceItem"></select>
  <input type="number" id="priceValue" placeholder="Enter new price" min="0">
  <button onclick="updatePrice()">Update Price</button>
</div>

<div class="section">
  <h3>🧾 Add Expense</h3>
  <button onclick="addExpense()">Add Expense</button>
</div>

<div class="section">
  <h3>📊 Products & Stock</h3>
  <div style="overflow-x:auto;">
    <table id="stockTable">
      <thead>
        <tr><th>Item</th><th>Stock</th><th>Price</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="section">
  <h3>📈 Recent Sales</h3>
  <div style="overflow-x:auto;">
    <table id="salesTable">
      <thead>
        <tr><th>Date</th><th>Items</th><th>Total</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="section">
  <h3>🧾 Expense History</h3>
  <div style="overflow-x:auto;">
    <table id="expenseTable">
      <thead>
        <tr><th>Date</th><th>Item</th><th>Amount</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
  <button style="background:#f44336; margin-top:10px;" onclick="clearHistory()">Clear History</button>
</div>

<script>
const products = [
  "Pork Siomai 65", "Chicken Siomai 65", "Beef Siomai 65", "Shrimp Siomai 65",
  "Pork Siomai 30", "Chicken Siomai 30", "Beef Siomai 30", "Shrimp Siomai 30", "Japanese Siomai 30",
  "Big Pork Siomai", "Big Chicken Siomai", "Big Beef Siomai", "Big Japanese Siomai",
  "Gyoza Dumplings", "Sharksfin Dumplings", "Hakaw Dumplings",
  "Jumbo Asado Siopao", "Jumbo Bola-Bola Siopao", "Mini Asado Siopao", "Mini Bola-Bola Siopao",
  "Chili Garlic Sauce", "Siopao Sauce"
];

const expenseTypes = ["Gasul", "Plastic", "Kuryente", "Tubig", "Internet", "Sahod", "Rent", "Transport", "Other"];

window.onload = function() {
  loadProducts();
  loadData();
}

function loadProducts() {
  let stockSelect = document.getElementById('stockItem');
  let priceSelect = document.getElementById('priceItem');

  products.forEach(p => {
    stockSelect.innerHTML += `<option value="${p}">${p}</option>`;
    priceSelect.innerHTML += `<option value="${p}">${p}</option>`;
  });
}

function loadData() {
  let salesHistory = JSON.parse(localStorage.getItem('salesHistory')) || [];
  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
  let stock = JSON.parse(localStorage.getItem('stock')) || {};
  let prices = JSON.parse(localStorage.getItem('prices')) || {};

  let totalSales = salesHistory.reduce((sum, s) => sum + s.total, 0);
  let totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
  let netProfit = totalSales - totalExpenses;

  document.getElementById('totalSales').textContent = totalSales;
  document.getElementById('totalExpenses').textContent = totalExpenses;
  document.getElementById('netProfit').textContent = netProfit;

  // Load stock table
  let stockBody = document.querySelector('#stockTable tbody');
  stockBody.innerHTML = '';
  products.forEach(p => {
    stockBody.innerHTML += `
      <tr>
        <td>${p}</td>
        <td>${stock[p] || 0}</td>
        <td>₱${prices[p] || 0}</td>
      </tr>
    `;
  });

  // Load sales table
  let salesBody = document.querySelector('#salesTable tbody');
  salesBody.innerHTML = '';
  salesHistory.slice(-10).reverse().forEach(sale => {
    let items = sale.items.map(i => `${i.name} x${i.qty}`).join(', ');
    salesBody.innerHTML += `
      <tr>
        <td>${sale.time}</td>
        <td>${items}</td>
        <td>₱${sale.total}</td>
      </tr>
    `;
  });

  // Load expense table
  let expenseBody = document.querySelector('#expenseTable tbody');
  expenseBody.innerHTML = '';
  expenses.slice(-10).reverse().forEach(exp => {
    expenseBody.innerHTML += `
      <tr>
        <td>${exp.time}</td>
        <td>${exp.item}</td>
        <td>₱${exp.amount}</td>
      </tr>
    `;
  });
}

function addStock() {
  let item = document.getElementById('stockItem').value;
  let qty = parseInt(document.getElementById('stockQty').value);

  if (!qty || qty <= 0) {
    alert("Enter valid quantity!");
    return;
  }

  let stock = JSON.parse(localStorage.getItem('stock')) || {};
  stock[item] = (stock[item] || 0) + qty;
  localStorage.setItem('stock', JSON.stringify(stock));

  alert(`${qty} pcs added to ${item}`);
  document.getElementById('stockQty').value = '';
  loadData();
}

function updatePrice() {
  let item = document.getElementById('priceItem').value;
  let price = parseFloat(document.getElementById('priceValue').value);

  if (isNaN(price) || price < 0) {
    alert("Enter valid price!");
    return;
  }

  let prices = JSON.parse(localStorage.getItem('prices')) || {};
  prices[item] = price;
  localStorage.setItem('prices', JSON.stringify(prices));

  alert(`Price updated for ${item}`);
  document.getElementById('priceValue').value = '';
  loadData();
}

function addExpense() {
  let choice = prompt(`Piliin ang expense:
1. Gasul
2. Plastic
3. Kuryente
4. Tubig
5. Internet
6. Sahod
7. Rent
8. Transport
9. Other`);

  if (!choice) return;

  let index = parseInt(choice) - 1;
  let expenseName;

  if (index >= 0 && index < 8) {
    expenseName = expenseTypes[index];
  } else if (index === 8) {
    expenseName = prompt("Ano ang binili mo?");
    if (!expenseName) return;
  } else {
    alert("Invalid choice!");
    return;
  }

  let amount = parseFloat(prompt(`Enter amount for ${expenseName}:`));

  if (isNaN(amount) || amount <= 0) {
    alert("Invalid amount!");
    return;
  }

  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

  expenses.push({
    item: expenseName,
    amount: amount,
    time: new Date().toLocaleString()
  });

  localStorage.setItem('expenses', JSON.stringify(expenses));
  alert(`${expenseName} - ₱${amount} added to expenses!`);
  loadData();
}

function clearHistory() {
  if (confirm("Are you sure you want to clear all history?")) {
    localStorage.removeItem('salesHistory');
    localStorage.removeItem('expenses');
    alert("History cleared!");
    loadData();
  }
}
</script>
</body>
</html>
