<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ff6b35">
<link rel="manifest" href="manifest.json">
<title>DHAN SIOMAI - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:20px;}
.header {
  background:linear-gradient(135deg, #ff6b35, #ff4500);
  color:white; padding:20px; border-radius:15px; margin-bottom:20px;
  text-align:center;
}
.card {
  background:white; border-radius:15px; padding:20px; margin-bottom:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
h2 {color:#ff6b35; margin-bottom:15px; font-size:18px;}
input, select, button {
  width:100%; padding:14px; margin-bottom:12px;
  border:2px solid #ddd; border-radius:10px; font-size:16px;
}
button {
  background:#ff6b35; color:white; border:none; font-weight:700;
  cursor:pointer;
}
.btn-green {background:#28a745;}
.btn-red {background:#dc3545;}
.btn-blue {background:#17a2b8;}
.stats {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;
}
.stat-box {padding:15px; border-radius:12px; color:white; text-align:center;}
.stat-sales {background:#28a745;}
.stat-expenses {background:#dc3545;}
.stat-profit {background:#17a2b8;}
table {width:100%; border-collapse:collapse; font-size:14px;}
th, td {padding:10px; text-align:left; border-bottom:1px solid #eee;}
th {background:#ff6b35; color:white;}
.expense-item {
  display:flex; justify-content:space-between; padding:12px;
  border-bottom:1px solid #eee;
}
.expense-item:last-child {border-bottom:none;}
</style>
</head>
<body>

<div class="header">
  <h1>🔥 DHAN SIOMAI</h1>
  <p>Admin Dashboard</p>
</div>

<div class="stats">
  <div class="stat-box stat-sales">
    <div>Total Sales</div>
    <h3 id="totalSales">₱0</h3>
  </div>
  <div class="stat-box stat-expenses">
    <div>Expenses</div>
    <h3 id="totalExpenses">₱0</h3>
  </div>
  <div class="stat-box stat-profit">
    <div>Net Profit</div>
    <h3 id="netProfit">₱0</h3>
  </div>
</div>

<div class="card">
  <h2>➕ Add Stock</h2>
  <select id="stockItem"></select>
  <input type="number" id="stockQty" placeholder="Quantity to add">
  <button class="btn-green" onclick="addStock()">Add Stock</button>
</div>

<div class="card">
  <h2>💰 PRICE MANAGEMENT</h2>
  <select id="priceItem" onchange="loadPrice()">
    <option value="">Select Item</option>
  </select>
  <input type="number" id="priceValue" placeholder="Enter new price">
  <button class="btn-blue" onclick="updatePrice()">Update Price</button>
</div>

<div class="card">
  <h2>📦 Products & Stock</h2>
  <div id="productsList"></div>
</div>

<div class="card">
  <h2>💸 Expenses</h2>
  <button class="btn-red" onclick="addExpense()">➕ ADD EXPENSE</button>
  <div id="expenseList"></div>
  <button class="btn-red" onclick="clearExpenses()">Clear History</button>
</div>

<script>
const products = [
  "Pork Siomai 65", "Chicken Siomai 65", "Beef Siomai 65", "Shrimp Siomai 65",
  "Pork Siomai 30", "Chicken Siomai 30", "Beef Siomai 30", "Shrimp Siomai 30", "Japanese Siomai 30",
  "Big Pork Siomai", "Big Chicken Siomai", "Big Beef Siomai", "Big Japanese Siomai",
  "Gyoza Dumplings", "Sharksfin Dumplings", "Hakaw Dumplings",
  "Jumbo Asado Siopao", "Jumbo Bola-Bola Siopao", "Mini Asado Siopao", "Mini Bola-Bola Siopao",
  "Chili Garlic Sauce", "Siopao Sauce"
];

const commonExpenses = [
  "Gasul", "Plastic", "Kuryente", "Tubig", "Internet",
  "Sahod", "Rent", "Transport", "Other"
];

window.onload = function() {
  let stockSelect = document.getElementById('stockItem');
  let priceSelect = document.getElementById('priceItem');
  products.forEach(p => {
    stockSelect.innerHTML += `<option value="${p}">${p}</option>`;
    priceSelect.innerHTML += `<option value="${p}">${p}</option>`;
  });
  updateDashboard();

  // Register service worker for PWA
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
}

function addStock() {
  let item = document.getElementById('stockItem').value;
  let qty = parseInt(document.getElementById('stockQty').value);
  if(!qty || qty <= 0) return alert("Invalid quantity!");

  let stock = JSON.parse(localStorage.getItem('stock')) || {};
  stock[item] = (stock[item] || 0) + qty;
  localStorage.setItem('stock', JSON.stringify(stock));

  document.getElementById('stockQty').value = '';
  updateDashboard();
  alert("Stock added!");
}

function loadPrice() {
  let item = document.getElementById('priceItem').value;
  let prices = JSON.parse(localStorage.getItem('prices')) || {};
  document.getElementById('priceValue').value = prices[item] || '';
}

function updatePrice() {
  let item = document.getElementById('priceItem').value;
  let price = parseFloat(document.getElementById('priceValue').value);
  if(!item || isNaN(price)) return alert("Select item and enter price!");

  let prices = JSON.parse(localStorage.getItem('prices')) || {};
  prices[item] = price;
  localStorage.setItem('prices', JSON.stringify(prices));
  alert("Price updated!");
}

function addExpense() {
  let desc = prompt("Piliin ang expense:\n1. Gasul\n2. Plastic\n3. Kuryente\n4. Tubig\n5. Internet\n6. Sahod\n7. Rent\n8. Transport\n9. Other");

  let expenseName = "";
  if(desc === "1") expenseName = "Gasul";
  else if(desc === "2") expenseName = "Plastic";
  else if(desc === "3") expenseName = "Kuryente";
  else if(desc === "4") expenseName = "Tubig";
  else if(desc === "5") expenseName = "Internet";
  else if(desc === "6") expenseName = "Sahod";
  else if(desc === "7") expenseName = "Rent";
  else if(desc === "8") expenseName = "Transport";
  else if(desc === "9") expenseName = prompt("Ilagay ang expense name:");
  else return;

  let amount = prompt("Magkano:");
  if(!amount || isNaN(amount)) return alert("Invalid amount!");

  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
  expenses.push({
    name: expenseName,
    amount: parseFloat(amount),
    time: new Date().toLocaleString()
  });
  localStorage.setItem('expenses', JSON.stringify(expenses));
  updateDashboard();
}

function clearExpenses() {
  if(confirm("Clear all expenses?")) {
    localStorage.removeItem('expenses');
    updateDashboard();
  }
}

function updateDashboard() {
  let salesHistory = JSON.parse(localStorage.getItem('salesHistory')) || [];
  let stock = JSON.parse(localStorage.getItem('stock')) || {};
  let prices = JSON.parse(localStorage.getItem('prices')) || {};
  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

  let totalSales = salesHistory.reduce((sum, s) => sum + s.total, 0);
  let totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);

  document.getElementById('totalSales').textContent = '₱' + totalSales.toLocaleString();
  document.getElementById('totalExpenses').textContent = '₱' + totalExpenses.toLocaleString();
  document.getElementById('netProfit').textContent = '₱' + (totalSales - totalExpenses).toLocaleString();

  // Products list
  let prodList = document.getElementById('productsList');
  prodList.innerHTML = '';
  products.forEach(name => {
    prodList.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">
      <strong>${name}</strong><br>
      Stock: ${stock[name] || 0} | Price: ₱${prices[name] || 0}
    </div>`;
  });

  // Expenses list
  let expenseList = document.getElementById('expenseList');
  expenseList.innerHTML = '';
  if(expenses.length === 0) {
    expenseList.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">No expenses yet</div>';
  } else {
    expenses.slice(-10).reverse().forEach(e => {
      expenseList.innerHTML += `<div class="expense-item">
        <div>
          <strong>${e.name}</strong><br>
          <small>${e.time}</small>
        </div>
        <div style="color:red; font-weight:700;">-₱${e.amount}</div>
      </div>`;
    });
  }
}
</script>
</body>
</html>
