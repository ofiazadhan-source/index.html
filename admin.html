<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:15px;}
.header {background:linear-gradient(135deg, #ff6b35, #ff4500); color:white; padding:15px; border-radius:12px; margin-bottom:20px; text-align:center;}
.header h2 {font-size:20px;}
.card {background:white; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:15px;}
.card h3 {color:#ff6b35; margin-bottom:15px; font-size:18px;}
input, button {font-family:'Poppins', sans-serif;}
table {width:100%; border-collapse:collapse;}
th {background:#ff6b35; color:white; padding:10px; text-align:left; font-size:14px;}
td {padding:10px; border-bottom:1px solid #eee; font-size:14px;}
.admin-tools {border:2px solid #ff6b35;}
.btn-reset {width:100%; padding:12px; margin-bottom:10px; border:none; border-radius:8px; color:white; font-weight:700; font-size:15px; cursor:pointer;}
.btn-red {background:#f44336;}
.btn-orange {background:#ff9800;}
.btn-purple {background:#9c27b0;}
.note {font-size:12px; color:#666; margin-top:10px;}
</style>
</head>
<body>

<div class="header">
  <h2>⚙️ DHAN SIOMAI ADMIN</h2>
</div>

<div class="card">
  <h3>📦 Manage Stock & Price</h3>
  <div id="stockTable"></div>
</div>

<div class="card">
  <h3>📊 Recent Sales</h3>
  <div id="salesTable"></div>
</div>

<div class="card">
  <h3>💸 Add Expense</h3>
  <div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
    <input type="text" id="expenseDesc" placeholder="Description" style="flex:2; min-width:150px; padding:10px; border:1px solid #ddd; border-radius:8px;">
    <input type="number" id="expenseAmount" placeholder="Amount" style="flex:1; min-width:100px; padding:10px; border:1px solid #ddd; border-radius:8px;">
    <button onclick="addExpense()" style="background:#ff6b35; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:700;">Add</button>
  </div>
</div>

<div class="card">
  <h3>🧾 Recent Expenses</h3>
  <div id="expensesTable"></div>
</div>

<div class="card admin-tools">
  <h3>⚠️ Admin Tools - Ingat dito!</h3>

  <button class="btn-reset btn-red" onclick="resetStock()">🔄 Reset Stock - Ibalik sa default stock values</button>

  <button class="btn-reset btn-orange" onclick="resetPrice()">💰 Reset Price - Ibalik sa default prices</button>

  <button class="btn-reset btn-purple" onclick="resetSalesExpenses()">🗑️ Reset Sales & Expenses - Burahin lahat ng benta at gastos</button>

  <div class="note">Note: Kailangan ng password bago mag-reset. Gawin lang pag may mali sa data.</div>
</div>

<script>
const defaultStock = {
  "Pork Siomai 65": 50, "Chicken Siomai 65": 50, "Beef Siomai 65": 50, "Shrimp Siomai 65": 50,
  "Pork Siomai 30": 50, "Chicken Siomai 30": 50, "Beef Siomai 30": 50, "Shrimp Siomai 30": 50,
  "Big Pork Siomai": 30, "Big Chicken Siomai": 30, "Big Beef Siomai": 30,
  "Gyoza Dumplings": 40, "Sharksfin Dumplings": 40, "Hakaw Dumplings": 40,
  "Jumbo Asado Siopao": 20, "Jumbo Bola-Bola Siopao": 20,
  "Mini Asado Siopao": 20, "Mini Bola-Bola Siopao": 20,
  "Chili Garlic Sauce": 20, "Siopao Sauce": 20
};

const defaultPrice = {
  "Pork Siomai 65": 150, "Chicken Siomai 65": 150, "Beef Siomai 65": 150, "Shrimp Siomai 65": 150,
  "Pork Siomai 30": 80, "Chicken Siomai 30": 80, "Beef Siomai 30": 80, "Shrimp Siomai 30": 80,
  "Big Pork Siomai": 200, "Big Chicken Siomai": 200, "Big Beef Siomai": 200,
  "Gyoza Dumplings": 180, "Sharksfin Dumplings": 180, "Hakaw Dumplings": 180,
  "Jumbo Asado Siopao": 120, "Jumbo Bola-Bola Siopao": 120,
  "Mini Asado Siopao": 60, "Mini Bola-Bola Siopao": 60,
  "Chili Garlic Sauce": 50, "Siopao Sauce": 40
};

const ADMIN_PASSWORD = "dhan123"; // Palitan mo to

window.onload = function() {
  loadStockTable();
  loadSales();
  loadExpenses();
}

function loadStockTable() {
  let stock = JSON.parse(localStorage.getItem('stock')) || defaultStock;
  let price = JSON.parse(localStorage.getItem('price')) || defaultPrice;

  let html = `
    <table>
      <tr>
        <th>Item</th>
        <th>Stock</th>
        <th>Price</th>
        <th>Action</th>
      </tr>
  `;

  Object.keys(stock).forEach(item => {
    html += `
      <tr>
        <td>${item}</td>
        <td><input type="number" value="${stock[item]}" id="stock-${item}" style="width:80px; padding:5px; border:1px solid #ddd; border-radius:5px;"></td>
        <td><input type="number" value="${price[item]}" id="price-${item}" style="width:80px; padding:5px; border:1px solid #ddd; border-radius:5px;"></td>
        <td><button onclick="saveItem('${item}')" style="background:#4CAF50; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Save</button></td>
      </tr>
    `;
  });

  html += `</table>`;
  document.getElementById('stockTable').innerHTML = html;
}

function saveItem(item) {
  let stock = JSON.parse(localStorage.getItem('stock')) || defaultStock;
  let price = JSON.parse(localStorage.getItem('price')) || defaultPrice;

  stock[item] = parseInt(document.getElementById(`stock-${item}`).value) || 0;
  price[item] = parseFloat(document.getElementById(`price-${item}`).value) || 0;

  localStorage.setItem('stock', JSON.stringify(stock));
  localStorage.setItem('price', JSON.stringify(price));

  alert(item + " updated!");
}

function loadSales() {
  let sales = JSON.parse(localStorage.getItem('sales')) || [];
  let html = `
    <table>
      <tr>
        <th>Date</th>
        <th>Item</th>
        <th>Qty</th>
        <th>Subtotal</th>
        <th>Action</th>
      </tr>
  `;

  if(sales.length === 0) {
    html += `<tr><td colspan="5" style="text-align:center; padding:20px;">No sales yet</td></tr>`;
  } else {
    sales.slice(0, 10).forEach((sale, idx) => {
      html += `
        <tr>
          <td>${sale.date}</td>
          <td>${sale.item}</td>
          <td>${sale.qty}</td>
          <td>₱${sale.subtotal}</td>
          <td><button onclick="deleteSale(${idx})" style="background:#f44336; color:white; border:none; padding:5px 10px; border-radius:5px;">Delete</button></td>
        </tr>
      `;
    });
  }

  html += `</table>`;
  document.getElementById('salesTable').innerHTML = html;
}

function deleteSale(idx) {
  if(confirm("Delete this sale?")) {
    let sales = JSON.parse(localStorage.getItem('sales')) || [];
    sales.splice(idx, 1);
    localStorage.setItem('sales', JSON.stringify(sales));
    loadSales();
  }
}

function addExpense() {
  let desc = document.getElementById('expenseDesc').value;
  let amount = parseFloat(document.getElementById('expenseAmount').value);

  if(!desc ||!amount || amount <= 0) {
    alert("Lagyan mo ng description at valid amount!");
    return;
  }

  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
  expenses.unshift({
    date: new Date().toLocaleString(),
    desc: desc,
    amount: amount
  });

  localStorage.setItem('expenses', JSON.stringify(expenses));

  document.getElementById('expenseDesc').value = '';
  document.getElementById('expenseAmount').value = '';

  loadExpenses();
  alert("Expense added!");
}

function loadExpenses() {
  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
  let html = `
    <table>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Amount</th>
        <th>Action</th>
      </tr>
  `;

  if(expenses.length === 0) {
    html += `<tr><td colspan="4" style="text-align:center; padding:20px;">No expenses yet</td></tr>`;
  } else {
    expenses.forEach((exp, idx) => {
      html += `
        <tr>
          <td>${exp.date}</td>
          <td>${exp.desc}</td>
          <td style="text-align:right;">₱${exp.amount}</td>
          <td style="text-align:center;">
            <button onclick="deleteExpense(${idx})" style="background:#f44336; color:white; border:none; padding:5px 10px; border-radius:5px;">Delete</button>
          </td>
        </tr>
      `;
    });
  }

  html += `</table>`;
  document.getElementById('expensesTable').innerHTML = html;
}

function deleteExpense(idx) {
  if(confirm("Delete this expense?")) {
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    expenses.splice(idx, 1);
    localStorage.setItem('expenses', JSON.stringify(expenses));
    loadExpenses();
  }
}

function resetStock() {
  let pass = prompt("Enter admin password:");
  if(pass!== ADMIN_PASSWORD) {
    alert("Wrong password!");
    return;
  }
  if(confirm("Reset all stock to default values?")) {
    localStorage.setItem('stock', JSON.stringify(defaultStock));
    loadStockTable();
    alert("Stock reset done!");
  }
}

function resetPrice() {
  let pass = prompt("Enter admin password:");
  if(pass!== ADMIN_PASSWORD) {
    alert("Wrong password!");
    return;
  }
  if(confirm("Reset all prices to default values?")) {
    localStorage.setItem('price', JSON.stringify(defaultPrice));
    loadStockTable();
    alert("Price reset done!");
  }
}

function resetSalesExpenses() {
  let pass = prompt("Enter admin password:");
  if(pass!== ADMIN_PASSWORD) {
    alert("Wrong password!");
    return;
  }
  if(confirm("DELETE ALL sales and expenses? This cannot be undone!")) {
    localStorage.removeItem('sales');
    localStorage.removeItem('expenses');
    loadSales();
    loadExpenses();
    alert("All sales and expenses deleted!");
  }
}
</script>
</body>
</html>
