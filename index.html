<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI POS</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
.header { background: #ff6b35; color: white; padding: 15px; text-align: center; font-size: 20px; font-weight: bold; }
.card { background: white; padding: 15px; margin: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.btn { background: #4CAF50; color: white; padding: 12px; border: none; width: 100%; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; }
.btn-orange { background: #ff6b35; }
select, input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
.toggle { background: #ff6b35; color: white; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div class="header">DHAN SIOMAI POS</div>

<div class="card">
  <h2 style="color: #ff6b35; text-align: center;">Welcome!</h2>
  <p style="text-align: center;">Fresh Siomai, Gyoza, Siopao<br>Delivered fresh daily</p>
  <button class="btn" onclick="window.location.href='order.html'">Order Now</button>
</div>

<div style="text-align: center; margin: 20px 0; color: #666;">ADMIN POS SYSTEM</div>

<div class="card">
  <h3>Today's Summary</h3>
  <p>Sales: ₱<span id="sales">0</span></p>
  <p>Expenses: ₱<span id="expenses">0</span></p>
  <p><strong>Net: ₱<span id="net">0</span></strong></p>
  <button class="btn">Checkout & Save</button>
</div>

<div class="card">
  <div class="toggle" onclick="toggleDiv('stockDiv')">📦 STOCK MANAGEMENT</div>
  <div id="stockDiv" style="display:none; margin-top:15px;">
    <select id="stockItem">
      <option>Select Item</option>
      <option>Pork Siomai 65</option>
      <option>Chicken Siomai 65</option>
      <option>Beef Siomai 65</option>
      <option>Shrimp Siomai 65</option>
      <option>Pork Siomai 30</option>
      <option>Chicken Siomai 30</option>
      <option>Beef Siomai 30</option>
      <option>Shrimp Siomai 30</option>
      <option>Japanese Siomai 30</option>
      <option>Big Pork Siomai</option>
      <option>Big Chicken Siomai</option>
      <option>Big Beef Siomai</option>
      <option>Big Japanese Siomai</option>
      <option>Gyoza Dumplings</option>
      <option>Sharksfin Dumplings</option>
      <option>Hakaw Dumplings</option>
      <option>Jumbo Asado Siopao</option>
      <option>Jumbo Bola-Bola Siopao</option>
      <option>Mini Asado Siopao</option>
      <option>Mini Bola-Bola Siopao</option>
      <option>Chili Garlic Sauce</option>
      <option>Siopao Sauce</option>
    </select>
    <input type="number" id="stockQty" placeholder="Enter quantity to add">
    <button class="btn" onclick="addStock()">Add Stock</button>
  </div>
</div>

<script>
function toggleDiv(id) {
  document.getElementById(id).style.display =
    document.getElementById(id).style.display === 'none'? 'block' : 'none';
}

function addStock() {
  let item = document.getElementById('stockItem').value;
  let qty = parseInt(document.getElementById('stockQty').value);
  if(item === 'Select Item' ||!qty || qty <= 0) return alert('Select item and enter valid quantity');

  let stock = JSON.parse(localStorage.getItem('stock') || '{}');
  stock[item] = (stock[item] || 0) + qty;
  localStorage.setItem('stock', JSON.stringify(stock));
  alert(qty + ' added to ' + item);
  document.getElementById('stockQty').value = '';
}
</script>

</body>
</html>
