<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DHAN SIOMAI System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html, body {
  width:100%;
  height:100%;
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg, #ff6b35, #ff4500);
  display:flex;
  align-items:center;
  justify-content:center;
}
.container {
  width:90%;
  max-width:400px;
  text-align:center;
}
.logo {
  font-size:48px;
  margin-bottom:10px;
}
h1 {
  color:white;
  font-size:24px;
  font-weight:700;
  margin-bottom:8px;
}
.subtitle {
  color:rgba(255,255,255,0.9);
  font-size:14px;
  margin-bottom:40px;
}
.card {
  background:white;
  border-radius:20px;
  padding:30px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
.btn {
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  margin-bottom:12px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.btn-admin {
  background:#2196f3;
  color:white;
}
.btn-pos {
  background:#4caf50;
  color:white;
}
.btn:active {transform:scale(0.98);}
.note {
  margin-top:20px;
  font-size:12px;
  color:#666;
}
</style>
</head>
<body>
<div class="container">
  <div class="logo">🍢</div>
  <h1>DHAN SIOMAI</h1>
  <div class="subtitle">POS & Inventory System</div>

  <div class="card">
    <button class="btn btn-admin" onclick="location.href='admin.html'">🔧 ADMIN DASHBOARD</button>
    <button class="btn btn-pos" onclick="location.href='order.html'">🛒 START SELLING</button>
    <div class="note">
      Admin: Stock, Price, Expenses, History<br>
      POS: Selling, Receipt, Checkout
    </div>
  </div>
</div>
</body>
</html>
