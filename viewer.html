<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:15px;}
.header {background:linear-gradient(135deg, #ff6b35, #ff4500); color:white; padding:15px; border-radius:12px; margin-bottom:20px; text-align:center;}
.header h2 {font-size:20px;}
.summary {display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;}
.summary-card {padding:15px; border-radius:12px; color:white; text-align:center;}
.summary-card.green {background:#4CAF50;}
.summary-card.red {background:#f44336;}
.summary-card.blue {background:#2196F3;}
.summary-card h4 {font-size:13px; margin-bottom:5px; font-weight:400;}
.summary-card h2 {font-size:22px;}
.card {background:white; padding:15px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-bottom:15px;}
.card h3 {color:#ff6b35; margin-bottom:15px; font-size:18px;}
table {width:100%; border-collapse:collapse;}
th {background:#ff6b35; color:white; padding:10px; text-align:left; font-size:14px;}
td {padding:10px; border-bottom:1px solid #eee; font-size:14px;}
.category {background:#fff3f0; padding:10px; margin-bottom:8px; border-radius:8px; cursor:pointer; display:flex; justify-content:space-between; font-weight:700; color:#ff6b35;}
.category-content {display:none; padding-left:10px;}
.category-content.active {display:block;}
.product-item {padding:8px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between;}
</style>
</head>
<body>

<div class="header">
  <h2>📊 DHAN SIOMAI VIEWER</h2>
</div>

<div class="summary">
  <div class="summary-card green">
    <h4>Total Sales</h4>
    <h2 id="totalSales">₱0</h2>
  </div>
  <div class="summary-card red">
    <h4>Expenses</h4>
    <h2 id="totalExpenses">₱0</h2>
  </div>
  <div class="summary-card blue">
    <h4>Net Profit</h4>
    <h2 id="netProfit">₱0</h2>
  </div>
</div>

<div class="card">
  <h3>📦 Products & Stock</h3>
  <div id="productList"></div>
</div>

<div class="card">
  <h3>💰 Recent Sales</h3>
  <div id="salesTable"></div>
</div>

<div class="card">
  <h3>🧾 Recent Expenses</h3>
  <div id="expensesTable"></div>
</div>

<script>
let products = {
  "Siomai 65": [
    {name:"Pork Siomai 65", price:150},
    {name:"Chicken Siomai 65", price:150},
    {name:"Beef Siomai 65", price:150},
    {name:"Shrimp Siomai 65", price:150}
  ],
  "Siomai 30": [
    {name:"Pork Siomai 30", price:80},
    {name:"Chicken Siomai 30", price:80},
    {name:"Beef Siomai 30", price:80},
    {name:"Shrimp Siomai 30", price:80}
  ],
  "Big Siomai": [
    {name:"Big Pork Siomai", price:200},
    {name:"Big Chicken Siomai", price:200},
    {name:"Big Beef Siomai", price:200}
  ],
  "Dumplings": [
    {name:"Gyoza Dumplings", price:180},
    {name:"Sharksfin Dumplings", price:180},
    {name:"Hakaw Dumplings", price:180}
  ],
  "Siopao": [
    {name:"Jumbo Asado Siopao", price:120},
    {name:"Jumbo Bola-Bola Siopao", price:120},
    {name:"Mini Asado Siopao", price:60},
    {name:"Mini Bola-Bola Siopao", price:60}
  ],
  "Sauce": [
    {name:"Chili Garlic Sauce", price:50},
    {name:"Siopao Sauce", price:40}
  ]
};

window.onload = function() {
  loadSummary();
  loadProducts();
  loadSales();
  loadExpenses();
}

function loadSummary() {
  let sales = JSON.parse(localStorage.getItem('sales')) || [];
  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];

  let totalSales = sales.reduce((sum, s) => sum + s.subtotal, 0);
  let totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
  let netProfit = totalSales - totalExpenses;

  document.getElementById('totalSales').textContent = '₱' + totalSales;
  document.getElementById('totalExpenses').textContent = '₱' + totalExpenses;
  document.getElementById('netProfit').textContent = '₱' + netProfit;
}

function loadProducts() {
  let stock = JSON.parse(localStorage.getItem('stock')) || {};
  let price = JSON.parse(localStorage.getItem('price')) || {};
  let html = '';

  Object.keys(products).forEach((cat, idx) => {
    html += `
      <div class="category" onclick="toggleCat(${idx})">
        <span>📁 ${cat}</span>
        <span id="arrow${idx}">▶</span>
      </div>
      <div class="category-content" id="cat${idx}">
    `;

    products[cat].forEach(prod => {
      let stockQty = stock[prod.name] || 0;
      let prodPrice = price[prod.name] || prod.price;
      html += `
        <div class="product-item">
          <span>${prod.name}</span>
          <span>Stock: ${stockQty} | ₱${prodPrice}</span>
        </div>
      `;
    });

    html += `</div>`;
  });

  document.getElementById('productList').innerHTML = html;
}

function toggleCat(idx) {
  let content = document.getElementById(`cat${idx}`);
  let arrow = document.getElementById(`arrow${idx}`);
  content.classList.toggle('active');
  arrow.textContent = content.classList.contains('active')? '▼' : '▶';
}

function loadSales() {
  let sales = JSON.parse(localStorage.getItem('sales')) || [];
  let html = `
    <table>
      <tr>
        <th>Date</th>
        <th>Item</th>
        <th>Qty</th>
        <th>Subtotal</th>
      </tr>
  `;

  if(sales.length === 0) {
    html += `<tr><td colspan="4" style="text-align:center; padding:20px;">No sales yet</td></tr>`;
  } else {
    sales.slice(0, 20).forEach((sale) => {
      html += `
        <tr>
          <td>${sale.date}</td>
          <td>${sale.item}</td>
          <td>${sale.qty}</td>
          <td>₱${sale.subtotal}</td>
        </tr>
      `;
    });
  }

  html += `</table>`;
  document.getElementById('salesTable').innerHTML = html;
}

function loadExpenses() {
  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
  let html = `
    <table>
      <tr>
        <th>Date</th>
        <th>Item/Description</th>
        <th>Amount</th>
      </tr>
  `;

  if(expenses.length === 0) {
    html += `<tr><td colspan="3" style="text-align:center; padding:20px;">No expenses yet</td></tr>`;
  } else {
    expenses.forEach((exp) => {
      let desc = exp.desc || exp.description || "No description";
      let date = exp.date || "No date";

      html += `
        <tr>
          <td>${date}</td>
          <td>${desc}</td>
          <td style="text-align:right;">₱${exp.amount}</td>
        </tr>
      `;
    });
  }

  html += `</table>`;
  document.getElementById('expensesTable').innerHTML = html;
}
</script>
</body>
</html>
