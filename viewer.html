<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viewer Mode - DHAN SIOMAI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:15px;}
.header {
  background:linear-gradient(135deg, #ff6b35, #ff4500);
  color:white; padding:20px; border-radius:15px; margin-bottom:20px;
  text-align:center; position:relative;
}
.logout-btn {
  position:absolute; right:15px; top:15px; background:white; color:#ff6b35;
  border:none; padding:8px 15px; border-radius:8px; font-weight:700;
  cursor:pointer;
}
.stats-grid {
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px;
}
.stat-card {
  padding:15px; border-radius:12px; text-align:center; color:white;
}
.stat-card.green {background:#4caf50;}
.stat-card.red {background:#f44336;}
.stat-card.blue {background:#2196f3;}
.stat-card h3 {font-size:24px; margin-top:5px;}
.section {
  background:white; border-radius:12px; padding:15px; margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.section h3 {color:#ff6b35; margin-bottom:15px;}
table {width:100%; border-collapse:collapse;}
th, td {padding:10px; text-align:left; border-bottom:1px solid #eee;}
th {background:#ff6b35; color:white;}
.badge {
  display:inline-block; padding:5px 10px; border-radius:6px; 
  color:white; font-weight:600; font-size:13px;
}
.category-folder {
  margin-bottom:10px; border:1px solid #ddd; border-radius:8px;
}
.category-header {
  padding:12px; background:#fff3f0; cursor:pointer; font-weight:700;
  display:flex; justify-content:space-between;
}
.category-content {display:none; padding:10px;}
.category-folder.active .category-content {display:block;}
.category-folder.active .arrow {transform:rotate(90deg);}
.arrow {transition:0.3s;}
</style>
</head>
<body>

<div class="header">
  <h2>👁️ Viewer Mode</h2>
  <p>Read Only - Sales, Expenses, Stock, Price</p>
  <button class="logout-btn" onclick="window.location.href='index.html'">Logout</button>
</div>

<div class="stats-grid">
  <div class="stat-card green">
    <div>Total Sales</div>
    <h3>₱<span id="totalSales">0</span></h3>
  </div>
  <div class="stat-card red">
    <div>Expenses</div>
    <h3>₱<span id="totalExpenses">0</span></h3>
  </div>
  <div class="stat-card blue">
    <div>Net Profit</div>
    <h3>₱<span id="netProfit">0</span></h3>
  </div>
</div>

<div class="section">
  <h3>📦 Products & Stock</h3>
  <div id="productsStock"></div>
</div>

<div class="section">
  <h3>💰 Recent Sales</h3>
  <div style="overflow-x:auto;">
    <table id="salesTable">
      <thead>
        <tr><th>Date</th><th>Item</th><th>Qty</th><th>Subtotal</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<div class="section">
  <h3>🧾 Recent Expenses</h3>
  <div style="overflow-x:auto;">
    <table id="expensesTable">
      <thead>
        <tr><th>Date</th><th>Item/Description</th><th>Amount</th></tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
window.onload = function() {
  loadData();
  setInterval(loadData, 5000); // auto refresh every 5 sec
}

function loadData() {
  let salesHistory = JSON.parse(localStorage.getItem('salesHistory')) || [];
  let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
  let stock = JSON.parse(localStorage.getItem('stock')) || {};
  let prices = JSON.parse(localStorage.getItem('prices')) || {};

  // Calculate totals
  let totalSales = salesHistory.reduce((sum, s) => sum + s.total, 0);
  let totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
  let netProfit = totalSales - totalExpenses;

  document.getElementById('totalSales').textContent = totalSales;
  document.getElementById('totalExpenses').textContent = totalExpenses;
  document.getElementById('netProfit').textContent = netProfit;

  // Load products & stock
  loadProductsStock(stock, prices);
  
  // Load sales table
  let salesBody = document.querySelector('#salesTable tbody');
  salesBody.innerHTML = '';
  salesHistory.slice(-20).reverse().forEach(sale => {
    sale.items.forEach(item => {
      salesBody.innerHTML += `
        <tr>
          <td>${sale.time}</td>
          <td><span class="badge" style="background:${getColor(item.name)}">${item.name}</span></td>
          <td>${item.qty}</td>
          <td>₱${item.subtotal}</td>
        </tr>
      `;
    });
  });

  // Load expenses table
  let expensesBody = document.querySelector('#expensesTable tbody');
  expensesBody.innerHTML = '';
  expenses.slice(-20).reverse().forEach(exp => {
    expensesBody.innerHTML += `
      <tr>
        <td>${exp.time}</td>
        <td>${exp.item}</td>
        <td>₱${exp.amount}</td>
      </tr>
    `;
  });
}

function loadProductsStock(stock, prices) {
  const products = [
    {name:"Pork Siomai 65", cat:"Siomai 65"},
    {name:"Chicken Siomai 65", cat:"Siomai 65"},
    {name:"Beef Siomai 65", cat:"Siomai 65"},
    {name:"Shrimp Siomai 65", cat:"Siomai 65"},
    {name:"Pork Siomai 30", cat:"Siomai 30"},
    {name:"Chicken Siomai 30", cat:"Siomai 30"},
    {name:"Beef Siomai 30", cat:"Siomai 30"},
    {name:"Shrimp Siomai 30", cat:"Siomai 30"},
    {name:"Japanese Siomai 30", cat:"Siomai 30"},
    {name:"Big Pork Siomai", cat:"Big Siomai"},
    {name:"Big Chicken Siomai", cat:"Big Siomai"},
    {name:"Big Beef Siomai", cat:"Big Siomai"},
    {name:"Big Japanese Siomai", cat:"Big Siomai"},
    {name:"Gyoza Dumplings", cat:"Dumplings"},
    {name:"Sharksfin Dumplings", cat:"Dumplings"},
    {name:"Hakaw Dumplings", cat:"Dumplings"},
    {name:"Jumbo Asado Siopao", cat:"Siopao"},
    {name:"Jumbo Bola-Bola Siopao", cat:"Siopao"},
    {name:"Mini Asado Siopao", cat:"Siopao"},
    {name:"Mini Bola-Bola Siopao", cat:"Siopao"},
    {name:"Chili Garlic Sauce", cat:"Sauce"},
    {name:"Siopao Sauce", cat:"Sauce"}
  ];

  let grouped = {};
  products.forEach(p => {
    if(!grouped[p.cat]) grouped[p.cat] = [];
    grouped[p.cat].push(p);
  });

  let container = document.getElementById('productsStock');
  container.innerHTML = '';
  let idx = 0;

  Object.keys(grouped).forEach(cat => {
    let folderId = 'cat' + idx;
    let html = `
      <div class="category-folder" id="${folderId}">
        <div class="category-header" onclick="toggleCat('${folderId}')">
          <span>📁 ${cat}</span>
          <span class="arrow">▶</span>
        </div>
        <div class="category-content">
          <table style="width:100%">
            <tr><th>Item</th><th>Stock</th><th>Price</th></tr>
    `;

    grouped[cat].forEach(p => {
      html += `
        <tr>
          <td>${p.name}</td>
          <td>${stock[p.name] || 0}</td>
          <td>₱${prices[p.name] || '-'}</td>
        </tr>
      `;
    });

    html += `</table></div></div>`;
    container.innerHTML += html;
    idx++;
  });
}

function toggleCat(id) {
  document.getElementById(id).classList.toggle('active');
}

function getColor(name) {
  const colors = ['#f44336', '#ff9800', '#9c27b0', '#3f51b5', '#009688', '#ff5722'];
  let hash = 0;
  for(let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}
</script>
</body>
</html>
