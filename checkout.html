<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt - DHAN SIOMAI POS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:20px;}
.container {max-width:600px; margin:0 auto; background:white; border-radius:12px; padding:20px; box-shadow:0 2px 8px rgba(0,0,0,0.1);}
h2 {color:#ff6b35; margin-bottom:10px; text-align:center;}
.receipt-header {text-align:center; margin-bottom:15px; border-bottom:2px dashed #ddd; padding-bottom:15px;}
.receipt-header h3 {font-size:18px; margin-bottom:5px;}
.receipt-header p {font-size:12px; color:#666;}
.cart-item {display:flex; justify-content:space-between; padding:8px 0; font-size:14px;}
.divider {border-bottom:1px dashed #ddd; margin:10px 0;}
.total-row {display:flex; justify-content:space-between; font-size:18px; font-weight:700; margin-top:10px;}
.payment-info {background:#f9f9f9; padding:10px; border-radius:8px; margin-top:15px; font-size:14px;}
.payment-info div {padding:4px 0;}
.btn-group {display:flex; gap:10px; margin-top:20px;}
.btn {flex:1; padding:12px; border:none; border-radius:8px; font-weight:700; cursor:pointer; font-size:16px;}
.btn-print {background:#ff6b35; color:white;}
.btn-back {background:#666; color:white;}
@media print {
  body {background:white; padding:0;}
.container {box-shadow:none; padding:0;}
.btn-group {display:none;}
}
</style>
</head>
<body>
<div class="container" id="receipt">
  <div class="receipt-header">
    <h3>🔥 DHAN SIOMAI POS</h3>
    <p>Receipt #: <span id="receiptNo"></span></p>
    <p id="dateTime"></p>
  </div>
  
  <div id="cartList"></div>
  
  <div class="divider"></div>
  
  <div class="total-row">
    <span>Total Items:</span>
    <span id="totalItems">0</span>
  </div>
  <div class="total-row">
    <span>Total Amount:</span>
    <span id="totalPrice">₱0</span>
  </div>

  <div class="payment-info" id="paymentInfo"></div>
  
  <div class="divider"></div>
  <p style="text-align:center; font-size:12px; color:#666; margin-top:15px;">
    Salamat sa pag-order! 🙏
  </p>
</div>

<div class="btn-group">
  <button class="btn btn-back" onclick="history.back()">← Back</button>
  <button class="btn btn-print" onclick="window.print()">🖨️ Print Receipt</button>
</div>

<script>
window.onload = function() {
  document.getElementById('receiptNo').textContent = Math.floor(Math.random() * 100000);
  document.getElementById('dateTime').textContent = new Date().toLocaleString('en-PH');

  const urlParams = new URLSearchParams(window.location.search);
  const cartData = urlParams.get('cart');
  const paymentData = urlParams.get('payment');
  
  if(!cartData) {
    document.getElementById('cartList').innerHTML = '<p style="text-align:center;">Walang items sa cart</p>';
    return;
  }

  const cart = JSON.parse(decodeURIComponent(cartData));
  let html = '';
  let total = 0;
  let totalItems = 0;

  Object.keys(cart).forEach(name => {
    let qty = cart[name];
    let price = getPrice(name);
    let subtotal = price * qty;
    total += subtotal;
    totalItems += qty;
    html += `
      <div class="cart-item">
        <span>${name} x${qty}</span>
        <span>₱${subtotal}</span>
      </div>
    `;
  });

  document.getElementById('cartList').innerHTML = html;
  document.getElementById('totalItems').textContent = totalItems;
  document.getElementById('totalPrice').textContent = '₱' + total;

  // Payment info
  if(paymentData) {
    const payment = JSON.parse(decodeURIComponent(paymentData));
    let payHtml = '';
    
    if(payment.method === 'Cash') {
      payHtml = `
        <div><strong>Payment Method:</strong> Cash</div>
        <div><strong>Cash:</strong> ₱${payment.cash}</div>
        <div><strong>Change:</strong> ₱${payment.change}</div>
      `;
    } else if(payment.method === 'GCash') {
      payHtml = `
        <div><strong>Payment Method:</strong> GCash</div>
        <div><strong>Send to:</strong> ${payment.gcashName}</div>
        <div><strong>GCash No:</strong> ${payment.gcashNumber}</div>
      `;
    }
    document.getElementById('paymentInfo').innerHTML = payHtml;
  }
}

function getPrice(name) {
  const prices = {
    "Pork Siomai 65":150, "Chicken Siomai 65":150, "Beef Siomai 65":150, "Shrimp Siomai 65":150,
    "Pork Siomai 30":80, "Chicken Siomai 30":80, "Beef Siomai 30":80, "Shrimp Siomai 30":80,
    "Big Pork Siomai":200, "Big Chicken Siomai":200, "Big Beef Siomai":200,
    "Gyoza Dumplings":180, "Sharksfin Dumplings":180, "Hakaw Dumplings":180,
    "Jumbo Asado Siopao":120, "Jumbo Bola-Bola Siopao":120,
    "Mini Asado Siopao":60, "Mini Bola-Bola Siopao":60,
    "Chili Garlic Sauce":50, "Siopao Sauce":40
  };
  return prices[name] || 0;
}
</script>
</body>
</html>
