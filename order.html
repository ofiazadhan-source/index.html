<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DHAN SIOMAI POS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html, body {width:100%; overflow-x:hidden; font-family:'Poppins', sans-serif; background:#f5f5f5; padding-bottom:70px; color:#1a1a1a; min-height:100vh;}
header {background:linear-gradient(135deg, #ff6b35, #ff4500); color:white; padding:18px 16px; text-align:center; position:sticky; top:0; z-index:100;}
.container {padding:12px; padding-bottom:20px;}
.section-title {background:white; color:#ff6b35; padding:10px 14px; margin:16px 0 10px 0; font-size:15px; font-weight:700; border-left:4px solid #ff6b35; border-radius:8px;}
.product-grid {display:grid; grid-template-columns:1fr; gap:12px;}
.product-card {background:white; border-radius:14px; padding:14px; box-shadow:0 3px 10px rgba(0,0,0,0.08);}
.price-row {display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
.price {font-size:20px; font-weight:700; color:#ff6b35;}
.stock-badge {padding:5px 10px; border-radius:20px; font-size:13px; font-weight:600; background:#e8f5e9; color:#2e7d32;}
.qty-control {display:flex; height:46px; gap:8px;}
.qty-control button.minus {width:46px; background:white; color:#ff6b35; border:2px solid #ff6b35; border-radius:10px; font-size:24px; font-weight:700;}
.qty-control input {flex:1; text-align:center; border:2px solid #ff6b35; border-radius:10px; font-size:18px; font-weight:700;}
.qty-control button.add {width:80px; background:#4caf50; color:white; border:none; border-radius:10px; font-size:14px; font-weight:700;}
.bottom-bar {position:fixed; bottom:0; left:0; width:100%; background:white; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 -4px 16px rgba(0,0,0,0.1);}
.bottom-bar button {background:#4caf50; color:white; border:none; padding:12px 28px; border-radius:10px; font-weight:700; font-size:15px;}
#receipt {display:none; width:58mm; font-family:'Courier New', monospace; font-size:12px;}
#receipt h3 {text-align:center; margin:0;}
#receipt.line {border-top:1px dashed #000; margin:4px 0;}
#receipt.item {display:flex; justify-content:space-between;}
@media print {
  body * {visibility:hidden;}
  #receipt, #receipt * {visibility:visible;}
  #receipt {display:block; position:absolute; left:0; top:0; width:58mm;}
  @page {margin:0; size:58mm auto;}
}
</style>
</head>
<body>
<header><h1>DHAN SIOMAI POS</h1></header>
<div class="container" id="container"></div>
<div class="bottom-bar">
  <div id="cartSummary">Cart: 0 items - ₱0</div>
  <button onclick="checkout()">CHECKOUT</button>
</div>
<div id="receipt"></div>

<script>
const categories = [
  {name: "Siomai 65", items: [
    {name: "Pork Siomai 65", price: 150},
    {name: "Chicken Siomai 65", price: 150},
    {name: "Beef Siomai 65", price: 160},
    {name: "Shrimp Siomai 65", price: 170}
  ]},
  {name: "Siomai 30", items: [
    {name: "Pork Siomai 30", price: 75},
    {name: "Chicken Siomai 30", price: 75},
    {name: "Beef Siomai 30", price: 80},
    {name: "Shrimp Siomai 30", price: 85},
    {name: "Japanese Siomai 30", price: 90}
  ]},
  {name: "Big Siomai", items: [
    {name: "Big Pork Siomai", price: 45},
    {name: "Big Chicken Siomai", price: 45},
    {name: "Big Beef Siomai", price: 45},
    {name: "Big Japanese Siomai", price: 45}
  ]},
  {name: "Dumplings", items: [
    {name: "Gyoza Dumplings", price: 50},
    {name: "Sharksfin Dumplings", price: 55},
    {name: "Hakaw Dumplings", price: 60}
  ]},
  {name: "Siopao", items: [
    {name: "Jumbo Asado Siopao", price: 45},
    {name: "Jumbo Bola-Bola Siopao", price: 45},
    {name: "Mini Asado Siopao", price: 25},
    {name: "Mini Bola-Bola Siopao", price: 25}
  ]},
  {name: "Sauce", items: [
    {name: "Chili Garlic Sauce", price: 50},
    {name: "Siopao Sauce", price: 30}
  ]}
];

let cart = {};

function loadStock() {return JSON.parse(localStorage.getItem('stock') || '{}');}
function saveStock(stock) {localStorage.setItem('stock', JSON.stringify(stock));}
function loadPrices() {return JSON.parse(localStorage.getItem('prices') || '{}');}
function savePrices(prices) {localStorage.setItem('prices', JSON.stringify(prices));}
function loadHistory() {return JSON.parse(localStorage.getItem('salesHistory') || '[]');}
function saveHistory(history) {localStorage.setItem('salesHistory', JSON.stringify(history));}

function getPrice(name) {
  let prices = loadPrices();
  return prices[name]!== undefined? prices[name] : categories.flatMap(c=>c.items).find(i=>i.name===name).price;
}

function renderProducts() {
  let stock = loadStock();
  let html = '';
  categories.forEach(cat => {
    html += `<div class="section-title">📁 ${cat.name}</div><div class="product-grid">`;
    cat.items.forEach(item => {
      let qty = stock[item.name] || 0;
      let price = getPrice(item.name);
      html += `<div class="product-card">
        <h3>${item.name}</h3>
        <div class="price-row">
          <div class="price">₱${price}</div>
          <div class="stock-badge" id="stock-${item.name}">Stock: ${qty}</div>
        </div>
        <div class="qty-control">
          <button class="minus" onclick="changeQty('${item.name}', -1)">-</button>
          <input type="number" id="qty-${item.name}" value="0" min="0" oninput="validateQty('${item.name}')">
          <button class="add" onclick="addToCart('${item.name}', ${price})">+ ADD</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById('container').innerHTML = html;
}

function changeQty(name, delta) {
  let input = document.getElementById(`qty-${name}`);
  let current = parseInt(input.value) || 0;
  let stock = loadStock();
  let max = stock[name] || 0;
  let newQty = current + delta;
  if (newQty < 0) newQty = 0;
  if (newQty > max) newQty = max;
  input.value = newQty;
}

function validateQty(name) {
  let input = document.getElementById(`qty-${name}`);
  let stock = loadStock();
  let max = stock[name] || 0;
  let val = parseInt(input.value) || 0;
  if (val < 0) input.value = 0;
  if (val > max) input.value = max;
}

function addToCart(name, price) {
  let input = document.getElementById(`qty-${name}`);
  let qty = parseInt(input.value) || 0;
  if (qty <= 0) return alert('Maglagay ng quantity!');
  let stock = loadStock();
  let currentStock = stock[name] || 0;
  if (qty > currentStock) return alert(`Kulang stock! Available: ${currentStock}`);
  stock[name] = currentStock - qty;
  saveStock(stock);
  if (cart[name]) cart[name].qty += qty;
  else cart[name] = {price, qty};
  input.value = 0;
  updateCartSummary();
  updateStockDisplay(name);
}

function updateStockDisplay(name) {
  let stock = loadStock();
  document.getElementById(`stock-${name}`).textContent = `Stock: ${stock[name] || 0}`;
}

function updateCartSummary() {
  let totalQty = 0, totalPrice = 0;
  for (let name in cart) {
    totalQty += cart[name].qty;
    totalPrice += cart[name].price * cart[name].qty;
  }
  document.getElementById('cartSummary').textContent = `Cart: ${totalQty} items - ₱${totalPrice}`;
}

function checkout() {
  if (Object.keys(cart).length === 0) return alert('Cart empty!');
  let total = 0, items = [];
  for (let name in cart) {
    let item = cart[name];
    total += item.price * item.qty;
    items.push({name, price:item.price, qty:item.qty, subtotal:item.price*item.qty});
  }

  let cash = prompt(`Total: ₱${total}\nEnter Cash:`);
    if (!cash || isNaN(cash)) return;
  cash = parseFloat(cash);
  let change = cash - total;
  if (change < 0) return alert('Kulang pera!');

  if (confirm(`Total: ₱${total}\nCash: ₱${cash}\nChange: ₱${change}\n\nPrint receipt?`)) {
    // Save sales
    let sales = parseInt(localStorage.getItem('sales')) || 0;
    localStorage.setItem('sales', sales + total);

    // Save to history
    let history = JSON.parse(localStorage.getItem('salesHistory') || '[]');
    history.push({
      time: new Date().toLocaleString(),
      total: total,
      cash: cash,
      change: change,
      items: items
    });
    localStorage.setItem('salesHistory', JSON.stringify(history));

    printReceipt(items, total, cash, change);
    cart = {};
    updateCartSummary();
  }
}

function printReceipt(items, total, cash, change) {
  let now = new Date().toLocaleString();
  let html = `
    <h3>DHAN SIOMAI</h3>
    <div style="text-align:center;">${now}</div>
    <div class="line"></div>
  `;
  items.forEach(i => {
    html += `<div class="item"><span>${i.qty}x ${i.name}</span><span>₱${i.subtotal}</span></div>`;
  });
  html += `<div class="line"></div>
    <div class="item"><strong>TOTAL</strong><strong>₱${total}</strong></div>
    <div class="item"><span>Cash</span><span>₱${cash}</span></div>
    <div class="item"><span>Change</span><span>₱${change}</span></div>
    <div class="line"></div>
    <div style="text-align:center; margin-top:8px;">THANK YOU!<br>COME AGAIN</div>
  `;
  document.getElementById('receipt').innerHTML = html;
  window.print();
}

// Init stock and prices
if (!localStorage.getItem('stock')) {
  let initialStock = {};
  categories.forEach(cat => {
    cat.items.forEach(item => {initialStock[item.name] = 50;});
  });
  saveStock(initialStock);
}
if (!localStorage.getItem('prices')) {
  let initialPrices = {};
  categories.forEach(cat => {
    cat.items.forEach(item => {initialPrices[item.name] = item.price;});
  });
  savePrices(initialPrices);
}
renderProducts();
</script>
</body>
</html>
