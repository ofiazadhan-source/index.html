<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DHAN SIOMAI Online Store</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html, body {
  width: 100%;
  overflow-x: hidden;
  font-family: 'Poppins', sans-serif;
  background: #f5f5f5;
  padding-bottom: 85px;
  color: #1a1a1a;
}

header {
  background: linear-gradient(135deg, #ff6b35, #ff4500);
  color: white;
  padding: 18px 16px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 12px rgba(255,107,53,0.3);
}
header h1 {
  font-size: 18px;
  font-weight: 700;
}

.container { padding: 12px; }
.section-title {
  background: white;
  color: #ff6b35;
  padding: 10px 14px;
  margin: 16px 0 10px 0;
  font-size: 15px;
  font-weight: 700;
  border-left: 4px solid #ff6b35;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

.product-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
.product-card {
  background: white;
  border-radius: 14px;
  padding: 14px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

.product-card h3 {
  font-size: 16px;
  margin-bottom: 6px;
  font-weight: 700;
}
.price-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.price {
  font-size: 20px;
  font-weight: 700;
  color: #ff6b35;
}
.stock-badge {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  background: #e8f5e9;
  color: #2e7d32;
}

.qty-control {
  display: flex;
  height: 46px;
  gap: 8px;
}
.qty-control button.minus {
  width: 46px;
  background: white;
  color: #ff6b35;
  border: 2px solid #ff6b35;
  border-radius: 10px;
  font-size: 24px;
  font-weight: 700;
}
.qty-control input {
  flex: 1;
  text-align: center;
  border: 2px solid #ff6b35;
  border-radius: 10px;
  font-size: 18px;
  font-weight: 700;
}
.qty-control button.add {
  width: 80px;
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
}
.qty-control button:active { opacity: 0.8; }

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
}
.bottom-bar #cartSummary {
  font-size: 14px;
  font-weight: 600;
}
.bottom-bar button {
  background: #4caf50;
  color: white;
  border: none;
  padding: 12px 28px;
  border-radius: 10px;
  font-weight: 700;
  font-size: 15px;
}
</style>
</head>
<body>
<header>
  <h1>DHAN SIOMAI POS</h1>
</header>

<div class="container" id="container"></div>

<div class="bottom-bar">
  <div id="cartSummary">Cart: 0 items - ₱0</div>
  <button onclick="checkout()">CHECKOUT</button>
</div>

<script>
const categories = [
  {name: "Siomai 65", items: [
    {name: "Pork Siomai 65", price: 150},
    {name: "Chicken Siomai 65", price: 150},
    {name: "Beef Siomai 65", price: 160},
    {name: "Shrimp Siomai 65", price: 170}
  ]},
  {name: "Siomai 30", items: [
    {name: "Pork Siomai 30", price: 75},
    {name: "Chicken Siomai 30", price: 75},
    {name: "Beef Siomai 30", price: 80},
    {name: "Shrimp Siomai 30", price: 85}
  ]},
  {name: "Siopao", items: [
    {name: "Jumbo Asado Siopao", price: 45},
    {name: "Jumbo Bola-Bola Siopao", price: 45},
    {name: "Mini Asado Siopao", price: 25},
    {name: "Mini Bola-Bola Siopao", price: 25}
  ]}
];

let cart = {};

function loadStock() {
  return JSON.parse(localStorage.getItem('stock') || '{}');
}

function saveStock(stock) {
  localStorage.setItem('stock', JSON.stringify(stock));
}

function renderProducts() {
  let stock = loadStock();
  let html = '';

  categories.forEach(cat => {
    html += `<div class="section-title">📁 ${cat.name}</div>`;
    html += `<div class="product-grid">`;

    cat.items.forEach(item => {
      let qty = stock[item.name] || 0;
      html += `
      <div class="product-card">
        <h3>${item.name}</h3>
        <div class="price-row">
          <div class="price">₱${item.price}</div>
          <div class="stock-badge" id="stock-${item.name}">Stock: ${qty}</div>
        </div>
        <div class="qty-control">
          <button class="minus" onclick="changeQty('${item.name}', -1)">-</button>
          <input type="number" id="qty-${item.name}" value="0" min="0" oninput="validateQty('${item.name}')">
          <button class="add" onclick="addToCart('${item.name}', ${item.price})">+ ADD</button>
        </div>
      </div>`;
    });

    html += `</div>`;
  });

  document.getElementById('container').innerHTML = html;
}

function changeQty(name, delta) {
  let input = document.getElementById(`qty-${name}`);
  let current = parseInt(input.value) || 0;
  let stock = loadStock();
  let max = stock[name] || 0;
  let newQty = current + delta;
  if (newQty < 0) newQty = 0;
  if (newQty > max) newQty = max;
  input.value = newQty;
}

function validateQty(name) {
  let input = document.getElementById(`qty-${name}`);
  let stock = loadStock();
  let max = stock[name] || 0;
  let val = parseInt(input.value) || 0;
  if (val < 0) input.value = 0;
  if (val > max) input.value = max;
}

function addToCart(name, price) {
  let input = document.getElementById(`qty-${name}`);
  let qty = parseInt(input.value) || 0;
  if (qty <= 0) return alert('Maglagay ng quantity!');

  let stock = loadStock();
  let currentStock = stock[name] || 0;
  if (qty > currentStock) return alert(`Kulang stock! Available: ${currentStock}`);

  stock[name] = currentStock - qty;
  saveStock(stock);

  if (cart[name]) {
    cart[name].qty += qty;
  } else {
    cart[name] = {price, qty};
  }

  input.value = 0;
  updateCartSummary();
  updateStockDisplay(name);
}

function updateStockDisplay(name) {
  let stock = loadStock();
  let qty = stock[name] || 0;
  document.getElementById(`stock-${name}`).textContent = `Stock: ${qty}`;
}

function updateCartSummary() {
  let totalQty = 0;
  let totalPrice = 0;
  for (let name in cart) {
    totalQty += cart[name].qty;
    totalPrice += cart[name].price * cart[name].qty;
  }
  document.getElementById('cartSummary').textContent = `Cart: ${totalQty} items - ₱${totalPrice}`;
}

function checkout() {
  if (Object.keys(cart).length === 0) return alert('Cart empty!');
  let total = 0;
  for (let name in cart) {
    total += cart[name].price * cart[name].qty;
  }
  let cash = prompt(`Total: ₱${total}\nEnter Cash:`);
  if (!cash || isNaN(cash)) return;
  cash = parseFloat(cash);
  let change = cash - total;
  if (change < 0) return alert('Kulang pera!');
  if (confirm(`Total: ₱${total}\nCash: ₱${cash}\nChange: ₱${change}\n\nConfirm?`)) {
    alert('Order placed!');
    cart = {};
    updateCartSummary();
  }
}

if (!localStorage.getItem('stock')) {
  let initialStock = {};
  categories.forEach(cat => {
    cat.items.forEach(item => {
      initialStock[item.name] = 50;
    });
  });
  saveStock(initialStock);
}

renderProducts();
</script>
</body>
</html>
