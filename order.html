<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order - DHAN SIOMAI POS</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif;}
body {background:#f5f5f5; padding:10px;}
.header {text-align:center; margin-bottom:15px;}
.header h1 {color:#ff6b35; font-size:22px;}
.product-grid {display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:15px;}
.product {background:white; padding:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.product-name {font-size:14px; font-weight:600; margin-bottom:5px;}
.product-price {color:#ff6b35; font-weight:700; margin-bottom:8px;}
.qty-input {width:100%; padding:8px; border:1px solid #ddd; border-radius:6px; font-size:16px; text-align:center;}
.cart-box {background:white; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); position:sticky; bottom:10px;}
.cart-item {display:flex; justify-content:space-between; padding:5px 0; font-size:14px;}
.total {font-size:18px; font-weight:700; text-align:right; margin-top:10px;}
.btn-checkout {width:100%; background:#ff6b35; color:white; border:none; padding:12px; border-radius:8px; font-weight:700; font-size:16px; margin-top:10px;}
</style>
</head>
<body>
<div class="header">
  <h1>🔥 DHAN SIOMAI POS</h1>
</div>

<div id="productGrid" class="product-grid"></div>

<div class="cart-box">
  <h3>🛒 Cart</h3>
  <div id="cartList"></div>
  <div class="total" id="totalPrice">Total: ₱0</div>
  <button class="btn-checkout" onclick="checkout()">Checkout</button>
</div>

<script>
const products = {
  "Siomai 65pcs": [
    {name:"Pork Siomai 65", price:150},
    {name:"Chicken Siomai 65", price:150},
    {name:"Beef Siomai 65", price:150},
    {name:"Shrimp Siomai 65", price:150}
  ],
  "Siomai 30pcs": [
    {name:"Pork Siomai 30", price:80},
    {name:"Chicken Siomai 30", price:80},
    {name:"Beef Siomai 30", price:80},
    {name:"Shrimp Siomai 30", price:80}
  ],
  "Big Siomai": [
    {name:"Big Pork Siomai", price:200},
    {name:"Big Chicken Siomai", price:200},
    {name:"Big Beef Siomai", price:200}
  ],
  "Dumplings": [
    {name:"Gyoza Dumplings", price:180},
    {name:"Sharksfin Dumplings", price:180},
    {name:"Hakaw Dumplings", price:180}
  ],
  "Siopao Jumbo": [
    {name:"Jumbo Asado Siopao", price:120},
    {name:"Jumbo Bola-Bola Siopao", price:120}
  ],
  "Siopao Mini": [
    {name:"Mini Asado Siopao", price:60},
    {name:"Mini Bola-Bola Siopao", price:60}
  ],
  "Sauce": [
    {name:"Chili Garlic Sauce", price:50},
    {name:"Siopao Sauce", price:40}
  ]
};

let cart = {};

function loadProducts() {
  let html = '';
  Object.keys(products).forEach(cat => {
    products[cat].forEach(prod => {
      html += `
        <div class="product">
          <div class="product-name">${prod.name}</div>
          <div class="product-price">₱${prod.price}</div>
          <input type="number" min="0" placeholder="Qty" class="qty-input" 
                 onchange="updateCart('${prod.name}', this.value)">
        </div>
      `;
    });
  });
  document.getElementById('productGrid').innerHTML = html;
}

function updateCart(name, qty) {
  qty = parseInt(qty) || 0;
  if(qty > 0) {
    cart[name] = qty;
  } else {
    delete cart[name];
  }
  renderCart();
}

function renderCart() {
  let html = '';
  let total = 0;
  
  Object.keys(cart).forEach(name => {
    let qty = cart[name];
    let prod = Object.values(products).flat().find(p => p.name === name);
    let subtotal = prod.price * qty;
    total += subtotal;
    html += `<div class="cart-item"><span>${name} x${qty}</span><span>₱${subtotal}</span></div>`;
  });
  
  document.getElementById('cartList').innerHTML = html;
  document.getElementById('totalPrice').textContent = 'Total: ₱' + total;
}

function checkout() {
  if(Object.keys(cart).length === 0) {
    alert("Wala pang items sa cart!");
    return;
  }

  let method = prompt("Payment Method? Type 'Cash' or 'GCash'");
  if(!method) return;
  
  method = method.trim().toLowerCase();
  let payment = {};
  let total = Object.keys(cart).reduce((sum, name) => {
    let prod = Object.values(products).flat().find(p => p.name === name);
    return sum + (prod.price * cart[name]);
  }, 0);

  if(method === 'cash') {
    let cash = parseInt(prompt("Enter Cash Amount:")) || 0;
    if(cash < total) {
      alert("Kulang ang cash!");
      return;
    }
    payment = {method: 'Cash', cash: cash, change: cash - total};
  } 
  else if(method === 'gcash') {
    let name = prompt("GCash Account Name:");
    let number = prompt("GCash Number to send payment:");
    if(!name ||!number) {
      alert("Kailangan ng GCash name at number");
      return;
    }
    payment = {method: 'GCash', gcashName: name, gcashNumber: number};
  }
  else {
    alert("Invalid method. Type Cash or GCash only.");
    return;
  }

  let cartData = encodeURIComponent(JSON.stringify(cart));
  let paymentData = encodeURIComponent(JSON.stringify(payment));
  window.location.href = `checkout.html?cart=${cartData}&payment=${paymentData}`;
}

window.onload = loadProducts;
</script>
</body>
</html>
