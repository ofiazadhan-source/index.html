<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhan Store - Order</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
   .container {
      max-width: 900px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    #products {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
   .product {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
   .product h3 {
      margin: 0 0 10px 0;
      color: #333;
    }
   .product p {
      margin: 5px 0;
      color: #666;
    }
   .product button {
      width: 100%;
      padding: 10px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }
   .product button:hover {
      background: #45a049;
    }
    #cart {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    #cart h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dhan Store</h1>
    <div id="products"></div>
    <div id="cart">
      <h2>Cart</h2>
      <div id="cart-items">Cart is empty</div>
    </div>
  </div>

  <script>
    // HARDCODED PRODUCTS - PALITAN MO DITO KAPAG MAY BAGONG ITEM
    let allProducts = [
      {id: 1, category: "Drinks", name: "Coke", price: 25, stock: 50},
      {id: 2, category: "Snacks", name: "Chips", price: 15, stock: 100},
      {id: 3, category: "Candy", name: "Chocolate", price: 20, stock: 80}
    ];
    
    let cart = [];
    const productsDiv = document.getElementById('products');
    const cartItemsDiv = document.getElementById('cart-items');

    // Display products
    function displayProducts() {
      productsDiv.innerHTML = '';
      allProducts.forEach(p => {
        const div = document.createElement('div');
        div.className = 'product';
        div.innerHTML = `
          <h3>${p.name}</h3>
          <p><strong>Category:</strong> ${p.category}</p>
          <p><strong>Price:</strong> ₱${p.price}</p>
          <p><strong>Stock:</strong> ${p.stock}</p>
          <button onclick="addToCart(${p.id})">Add to Cart</button>
        `;
        productsDiv.appendChild(div);
      });
    }

    // Add to cart
    function addToCart(id) {
      const product = allProducts.find(p => p.id === id);
      if (!product) return;

      const item = cart.find(c => c.id === id);
      if (item) {
        item.qty++;
      } else {
        cart.push({...product, qty: 1});
      }
      updateCart();
    }

    // Update cart display
    function updateCart() {
      if (cart.length === 0) {
        cartItemsDiv.innerHTML = 'Cart is empty';
        return;
      }

      cartItemsDiv.innerHTML = cart.map(item =>
        `<div style="margin-bottom: 8px;">
          ${item.name} x${item.qty} - ₱${item.price * item.qty}
        </div>`
      ).join('');
    }

    // Run on page load
    displayProducts();
  </script>
</body>
</html>
