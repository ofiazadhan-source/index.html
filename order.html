<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI Online Store</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f5f5; padding-bottom: 70px; }
header { background: #ff6b35; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 18px; }
.container { padding: 15px; }
.section-title { background: #555; color: white; padding: 8px 15px; margin: 15px -15px; font-size: 14px; font-weight: bold; }
.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.product-card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative; overflow: hidden; }
.sold-out-ribbon { position: absolute; top: 10px; right: -25px; background: #ff6b35; color: white; padding: 3px 30px; transform: rotate(45deg); font-size: 10px; font-weight: bold; }
.product-card h3 { font-size: 14px; margin-bottom: 5px; padding-right: 40px; }
.price { font-size: 16px; font-weight: bold; color: #ff6b35; margin-bottom: 8px; }
.stock-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-bottom: 8px; }
.stock-badge.green { background: #4caf50; color: white; }
.stock-badge.red { background: #f44336; color: white; }
.qty-control { display: flex; height: 35px; }
.qty-control button { width: 35px; background: #ff6b35; color: white; border: none; font-size: 18px; font-weight: bold; }
.qty-control button:disabled { background: #ccc; }
.qty-control input { flex: 1; text-align: center; border: 1px solid #ddd; border-left: none; border-right: none; font-size: 14px; }
.qty-control.add-btn { width: 60px; font-size: 12px; }
.bottom-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: #ff6b35; color: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.bottom-bar button { background: #4caf50; color: white; border: none; padding: 10px 25px; border-radius: 5px; font-weight: bold; font-size: 14px; }
@media print {
  body * { visibility: hidden; }
  #receipt, #receipt * { visibility: visible; }
  #receipt { position: absolute; left: 0; top: 0; }
}
</style>
</head>
<body>
<header>
  <h1>DHAN SIOMAI ONLINE STORE</h1>
</header>

<div class="container" id="container"></div>

<div class="bottom-bar">
  <div id="cartSummary">Cart: 0 items - ₱0</div>
  <button onclick="checkout()">CHECKOUT</button>
</div>

<div id="receipt"></div>

<script>
const categories = [
  {name: "Siomai 65", items: [
    {name: "Pork Siomai 65", price: 150},
    {name: "Chicken Siomai 65", price: 150},
    {name: "Beef Siomai 65", price: 160},
    {name: "Shrimp Siomai 65", price: 170}
  ]},
  {name: "Siomai 30", items: [
    {name: "Pork Siomai 30", price: 75},
    {name: "Chicken Siomai 30", price: 75},
    {name: "Beef Siomai 30", price: 80},
    {name: "Shrimp Siomai 30", price: 85},
    {name: "Japanese Siomai 30", price: 90}
  ]},
  {name: "Big Siomai", items: [
    {name: "Big Pork Siomai", price: 45},
    {name: "Big Chicken Siomai", price: 45},
    {name: "Big Beef Siomai", price: 45},
    {name: "Big Japanese Siomai", price: 45}
  ]},
  {name: "Dumplings", items: [
    {name: "Gyoza Dumplings", price: 50},
    {name: "Sharksfin Dumplings", price: 55},
    {name: "Hakaw Dumplings", price: 60}
  ]}
];

let cart = {};

function loadStock() {
  return JSON.parse(localStorage.getItem('stock') || '{}');
}

function saveStock(stock) {
  localStorage.setItem('stock', JSON.stringify(stock));
}

function renderProducts() {
  let stock = loadStock();
  let html = '';
  
  categories.forEach(cat => {
    html += `<div class="section-title">📁 ${cat.name}</div>`;
    html += `<div class="product-grid">`;
    
    cat.items.forEach(item => {
      let qty = stock[item.name] || 0;
      let isSoldOut = qty <= 0;
      
      html += `
      <div class="product-card">
        ${isSoldOut? '<div class="sold-out-ribbon">SOLD OUT</div>' : ''}
        <h3>${item.name}</h3>
        <div class="price">₱${item.price}</div>
        <div class="stock-badge ${isSoldOut? 'red' : 'green'}">
          Stock: ${qty}
        </div>
        <div class="qty-control">
          <button ${isSoldOut? 'disabled' : ''} onclick="changeQty('${item.name}', -1)">-</button>
          <input type="number" id="qty-${item.name}" value="0" min="0" max="${qty}" ${isSoldOut? 'disabled' : ''}>
          <button class="add-btn" ${isSoldOut? 'disabled' : ''} onclick="addToCart('${item.name}', ${item.price})">+ ADD</button>
        </div>
      </div>`;
    });
    
    html += `</div>`;
  });
  
  document.getElementById('container').innerHTML = html;
}

function changeQty(name, delta) {
  let input = document.getElementById(`qty-${name}`);
  let current = parseInt(input.value) || 0;
  let max = parseInt(input.max) || 0;
  let newQty = current + delta;
  
  if (newQty < 0) newQty = 0;
  if (newQty > max) newQty = max;
  
  input.value = newQty;
}

function addToCart(name, price) {
  let input = document.getElementById(`qty-${name}`);
  let qty = parseInt(input.value) || 0;
  
  if (qty <= 0) return alert('Ilagay mo muna quantity!');
  
  let stock = loadStock();
  let currentStock = stock[name] || 0;
  
  if (qty > currentStock) {
    return alert(`Not enough stock! Available: ${currentStock}`);
  }
  
  // Deduct stock immediately pag ADD
  stock[name] = currentStock - qty;
  saveStock(stock);
  
  // Add to cart
  if (cart[name]) {
    cart[name].qty += qty;
  } else {
    cart[name] = {price, qty};
  }
  
  input.value = 0;
  updateCartSummary();
  renderProducts();
}

function updateCartSummary() {
  let totalQty = 0;
  let totalPrice = 0;
  
  for (let name in cart) {
    totalQty += cart[name].qty;
    totalPrice += cart[name].price * cart[name].qty;
  }
  
  document.getElementById('cartSummary').textContent = `Cart: ${totalQty} items - ₱${totalPrice}`;
}

function checkout() {
  if (Object.keys(cart).length === 0) return alert('Cart is empty!');
  
  let total = 0;
  let items = [];
  
  for (let name in cart) {
    let item = cart[name];
    let subtotal = item.price * item.qty;
    total += subtotal;
    items.push({name, price: item.price, qty: item.qty, subtotal});
  }
  
  let cash = prompt(`Total: ₱${total}\nEnter Cash Amount:`);
  if (!cash || isNaN(cash)) return alert('Invalid amount!');
  
  cash = parseFloat(cash);
  let change = cash - total;
  
  if (change < 0) return alert('Insufficient cash!');
  
  if (confirm(`Total: ₱${total}\nCash: ₱${cash}\nChange: ₱${change}\n\nConfirm checkout?`)) {
    printReceipt(items, total, cash, change);
    cart = {};
    updateCartSummary();
  }
}

function printReceipt(items, total, cash, change) {
  let now = new Date();
  let dateStr = now.toLocaleString('en-PH');

  let receiptHTML = `
  <div style="font-family: 'Courier New', monospace; width: 58mm; margin: 0; padding: 2mm; font-size: 10px; line-height: 1.1;">
    <div style="text-align: center;">
      <div style="font-size: 13px; font-weight: bold;">DHAN SIOMAI</div>
      <div style="font-size: 9px;">Fresh Siomai & Dumplings</div>
      <div style="font-size: 8px;">${dateStr}</div>
      <div style="border-top: 1px dashed #000; margin: 3px 0;"></div>
    </div>

    <div>
      ${items.map(i => `
        <div style="margin-bottom: 2px;">
          <div>${i.name}</div>
          <div style="display: flex; justify-content: space-between;">
            <span>${i.qty} x ${i.price}</span>
            <span>₱${i.subtotal}</span>
          </div>
        </div>
      `).join('')}
    </div>

    <div style="border-top: 1px dashed #000; margin: 3px 0;"></div>
    <div>
      <div style="display: flex; justify-content: space-between;">
        <span>TOTAL:</span><span>₱${total}</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span>CASH:</span><span>₱${cash}</span>
      </div>
      <div style="display: flex; justify-content: space-between; font-weight: bold;">
        <span>CHANGE:</span><span>₱${change}</span>
      </div>
    </div>

    <div style="border-top: 1px dashed #000; margin: 3px 0;"></div>
    <div style="text-align: center;">
      <div>Thank You, Come Again!</div>
      <div style="font-size: 8px;">God Bless!</div>
    </div>
  </div>
  `;

  let receiptDiv = document.getElementById('receipt');
  receiptDiv.innerHTML = receiptHTML;
  
  setTimeout(() => {
    window.print();
  }, 800);
}

// Initialize stock if empty
if (!localStorage.getItem('stock')) {
  let initialStock = {};
  categories.forEach(cat => {
    cat.items.forEach(item => {
      initialStock[item.name] = 50; // Default 50 each
    });
  });
  saveStock(initialStock);
}

renderProducts();
</script>
</body>
</html>
