<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI Online Order</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #f5f5f5; padding-bottom: 80px; }
header { background: #ff6b35; color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 100; }
header h1 { font-size: 20px; }
.container { padding: 15px; }
.product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.product-card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
.product-card h3 { font-size: 14px; margin-bottom: 5px; }
.product-card p { font-size: 16px; font-weight: bold; color: #ff6b35; margin-bottom: 8px; }
.product-card .stock { font-size: 12px; color: #666; margin-bottom: 8px; }
.product-card button { width: 100%; background: #ff6b35; color: white; border: none; padding: 8px; border-radius: 5px; font-weight: bold; }
.product-card button:disabled { background: #ccc; }
.cart-btn { position: fixed; bottom: 20px; right: 20px; background: #ff6b35; color: white; border: none; width: 60px; height: 60px; border-radius: 50%; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
.cart-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
.cart-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; }
.cart-modal { position: fixed; bottom: 0; left: 0; width: 100%; background: white; border-radius: 15px 15px 0 0; max-height: 80vh; overflow-y: auto; padding: 20px; }
.cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
.cart-total { font-size: 18px; font-weight: bold; margin: 15px 0; }
.cart-modal button { width: 100%; padding: 12px; background: #ff6b35; color: white; border: none; border-radius: 5px; font-weight: bold; margin-top: 10px; }
.close-btn { background: #ccc !important; color: #333 !important; }
#receipt { display: none; }
.sold-out { color: red; font-weight: bold; }
</style>
</head>
<body>
<header>
  <h1>DHAN SIOMAI</h1>
  <p>Fresh Siomai & Dumplings</p>
</header>

<div class="container">
  <div class="product-grid" id="productGrid"></div>
</div>

<button class="cart-btn" onclick="openCart()">
  🛒
  <span class="cart-badge" id="cartBadge">0</span>
</button>

<div class="cart-overlay" id="cartOverlay">
  <div class="cart-modal">
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <div class="cart-total">Total: ₱<span id="cartTotal">0</span></div>
    <button onclick="checkout()">CHECKOUT</button>
    <button class="close-btn" onclick="closeCart()">CLOSE</button>
  </div>
</div>

<div id="receipt"></div>

<script>
const products = [
  {name: "Pork Siomai 65", price: 150},
  {name: "Chicken Siomai 65", price: 150},
  {name: "Beef Siomai 65", price: 160},
  {name: "Shrimp Siomai 65", price: 170},
  {name: "Pork Siomai 30", price: 75},
  {name: "Chicken Siomai 30", price: 75},
  {name: "Beef Siomai 30", price: 80},
  {name: "Shrimp Siomai 30", price: 85},
  {name: "Japanese Siomai 30", price: 90},
  {name: "Big Pork Siomai", price: 25},
  {name: "Big Chicken Siomai", price: 25},
  {name: "Big Beef Siomai", price: 28},
  {name: "Big Japanese Siomai", price: 30},
  {name: "Gyoza Dumplings", price: 120},
  {name: "Sharksfin Dumplings", price: 120},
  {name: "Hakaw Dumplings", price: 140},
  {name: "Jumbo Asado Siopao", price: 45},
  {name: "Jumbo Bola-Bola Siopao", price: 45},
  {name: "Mini Asado Siopao", price: 25},
  {name: "Mini Bola-Bola Siopao", price: 25},
  {name: "Chili Garlic Sauce", price: 50},
  {name: "Siopao Sauce", price: 30}
];

let cart = [];

function loadStock() {
  return JSON.parse(localStorage.getItem('stock') || '{}');
}

function saveStock(stock) {
  localStorage.setItem('stock', JSON.stringify(stock));
}

function renderProducts() {
  let stock = loadStock();
  let html = '';
  
  products.forEach(p => {
    let qty = stock[p.name] || 0;
    html += `
    <div class="product-card">
      <h3>${p.name}</h3>
      <p>₱${p.price}</p>
      <div class="stock">Stock: ${qty}</div>
      <button ${qty == 0 ? 'disabled' : ''} onclick="addToCart('${p.name}', ${p.price})">
        ${qty == 0 ? 'SOLD OUT' : 'ADD TO CART'}
      </button>
    </div>`;
  });
  
  document.getElementById('productGrid').innerHTML = html;
}

function addToCart(name, price) {
  let stock = loadStock();
  if ((stock[name] || 0) <= 0) return;
  
  let existing = cart.find(i => i.name === name);
  if (existing) {
    existing.qty++;
  } else {
    cart.push({name, price, qty: 1});
  }
  
  updateCartBadge();
}

function updateCartBadge() {
  let totalQty = cart.reduce((sum, i) => sum + i.qty, 0);
  document.getElementById('cartBadge').textContent = totalQty;
}

function openCart() {
  document.getElementById('cartOverlay').style.display = 'block';
  renderCart();
}

function closeCart() {
  document.getElementById('cartOverlay').style.display = 'none';
}

function renderCart() {
  let html = '';
  let total = 0;
  
  cart.forEach((item, index) => {
    let subtotal = item.price * item.qty;
    total += subtotal;
    html += `
    <div class="cart-item">
      <div>
        <div>${item.name}</div>
        <div>${item.qty} x ₱${item.price}</div>
      </div>
      <div>₱${subtotal}</div>
    </div>`;
  });
  
  document.getElementById('cartItems').innerHTML = html || '<p>Cart is empty</p>';
  document.getElementById('cartTotal').textContent = total;
}

function checkout() {
  if (cart.length === 0) return alert('Cart is empty!');
  
  let total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
  let cash = prompt(`Total: ₱${total}\nEnter Cash Amount:`);
  
  if (!cash || isNaN(cash)) return alert('Invalid amount!');
  
  cash = parseFloat(cash);
  let change = cash - total;
  
  if (change < 0) return alert('Insufficient cash!');
  
  if (confirm(`Total: ₱${total}\nCash: ₱${cash}\nChange: ₱${change}\n\nConfirm checkout?`)) {
    // Update stock
    let stock = loadStock();
    cart.forEach(item => {
      stock[item.name] = (stock[item.name] || 0) - item.qty;
    });
    saveStock(stock);
    
    printReceipt(cart, total, cash, change);
    
    cart = [];
    updateCartBadge();
    closeCart();
    renderProducts();
  }
}

function printReceipt(items, total, cash, change) {
  let now = new Date();
  let dateStr = now.toLocaleString('en-PH');

  let receiptHTML = `
  <div style="font-family: 'Courier New', monospace; width: 58mm; margin: 0; padding: 2mm; font-size: 10px; line-height: 1.1;">
    <div style="text-align: center;">
      <div style="font-size: 13px; font-weight: bold;">DHAN SIOMAI</div>
      <div style="font-size: 9px;">Fresh Siomai & Dumplings</div>
      <div style="font-size: 8px;">${dateStr}</div>
      <div style="border-top: 1px dashed #000; margin: 3px 0;"></div>
    </div>

    <div>
      ${items.map(i => `
        <div style="margin-bottom: 2px;">
          <div>${i.name}</div>
          <div style="display: flex; justify-content: space-between;">
            <span>${i.qty} x ${i.price}</span>
            <span>₱${i.subtotal || i.price * i.qty}</span>
          </div>
        </div>
      `).join('')}
    </div>

    <div style="border-top: 1px dashed #000; margin: 3px 0;"></div>
    <div>
      <div style="display: flex; justify-content: space-between;">
        <span>TOTAL:</span><span>₱${total}</span>
      </div>
      <div style="display: flex; justify-content: space-between;">
        <span>CASH:</span><span>₱${cash}</span>
      </div>
      <div style="display: flex; justify-content: space-between; font-weight: bold;">
        <span>CHANGE:</span><span>₱${change}</span>
      </div>
    </div>

    <div style="border-top: 1px dashed #000; margin: 3px 0;"></div>
    <div style="text-align: center;">
      <div>Thank You, Come Again!</div>
      <div style="font-size: 8px;">God Bless!</div>
    </div>
  </div>
  `;

  let receiptDiv = document.getElementById('receipt');
  receiptDiv.innerHTML = receiptHTML;
  receiptDiv.style.display = 'block';
  
  setTimeout(() => {
    window.print();
    setTimeout(() => {
      receiptDiv.style.display = 'none';
    }, 1000);
  }, 1200);
}

renderProducts();
</script>
</body>
</html>
