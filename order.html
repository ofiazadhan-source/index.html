<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHAN SIOMAI ONLINE STORE</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
.header { background: #ff6b35; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; }
.category { background: #666; color: white; padding: 10px; margin: 10px 0 0 0; font-weight: bold; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
.card { background: white; padding: 10px; border-radius: 8px; position: relative; }
.card h4 { margin: 0 0 5px 0; font-size: 14px; }
.price { color: #ff6b35; font-weight: bold; font-size: 16px; }
.stock { background: #4CAF50; color: white; padding: 3px 8px; border-radius: 12px; display: inline-block; font-size: 12px; margin: 5px 0; }
.soldout { position: absolute; top: 10px; right: 10px; background: #ff6b35; color: white; padding: 5px 10px; transform: rotate(15deg); font-weight: bold; }
.qtybox { display: flex; margin-top: 8px; }
.qtybox input { flex: 1; text-align: center; border: 1px solid #ff6b35; border-left: 0; border-right: 0; }
.qtybox button { background: #ff6b35; color: white; border: none; padding: 5px 10px; cursor: pointer; }
.qtybox button:first-child { border-radius: 5px 0 0 5px; }
.qtybox button:last-child { border-radius: 0 5px 5px 0; }
</style>
</head>
<body>

<div class="header">DHAN SIOMAI ONLINE STORE</div>
<div id="productContainer"></div>

<script>
const products = [
  // 65's
  { cat: "65's", name: "Pork Siomai 65", price: 65 },
  { cat: "65's", name: "Chicken Siomai 65", price: 65 },
  { cat: "65's", name: "Beef Siomai 65", price: 65 },
  { cat: "65's", name: "Shrimp Siomai 65", price: 65 },

  // Siomai 30
  { cat: "Siomai 30", name: "Pork Siomai 30", price: 30 },
  { cat: "Siomai 30", name: "Chicken Siomai 30", price: 30 },
  { cat: "Siomai 30", name: "Beef Siomai 30", price: 30 },
  { cat: "Siomai 30", name: "Shrimp Siomai 30", price: 30 },
  { cat: "Siomai 30", name: "Japanese Siomai 30", price: 30 },

  // BIG SIOMAI
  { cat: "BIG SIOMAI", name: "Big Pork Siomai", price: 45 },
  { cat: "BIG SIOMAI", name: "Big Chicken Siomai", price: 45 },
  { cat: "BIG SIOMAI", name: "Big Beef Siomai", price: 45 },
  { cat: "BIG SIOMAI", name: "Big Japanese Siomai", price: 45 },

  // Dumplings
  { cat: "Dumplings", name: "Gyoza Dumplings", price: 50 },
  { cat: "Dumplings", name: "Sharksfin Dumplings", price: 55 },
  { cat: "Dumplings", name: "Hakaw Dumplings", price: 60 },

  // Siopao
  { cat: "Siopao", name: "Jumbo Asado Siopao", price: 40 },
  { cat: "Siopao", name: "Jumbo Bola-Bola Siopao", price: 40 },
  { cat: "Siopao", name: "Mini Asado Siopao", price: 25 },
  { cat: "Siopao", name: "Mini Bola-Bola Siopao", price: 25 },

  // Sauce
  { cat: "Sauce", name: "Chili Garlic Sauce", price: 10 },
  { cat: "Sauce", name: "Siopao Sauce", price: 5 }
];

function renderProducts() {
  let stock = JSON.parse(localStorage.getItem('stock') || '{}');
  let html = '';
  let currentCat = '';

  products.forEach(p => {
    if(p.cat!== currentCat) {
      if(currentCat!== '') html += '</div>';
      html += `<div class="category">📁 ${p.cat}</div><div class="grid">`;
      currentCat = p.cat;
    }

    let qty = stock[p.name] || 0;
    html += `
    <div class="card">
      <h4>${p.name}</h4>
      <div class="price">₱${p.price}</div>
      <div class="stock">Stock: ${qty}</div>
      ${qty === 0? '<div class="soldout">SOLD OUT</div>' : ''}
      <div class="qtybox">
        <button onclick="alert('Add to cart coming soon')">-</button>
        <input type="text" value="0" readonly>
        <button onclick="alert('Add to cart coming soon')" ${qty === 0? 'disabled' : ''}>+ ADD</button>
      </div>
    </div>`;
  });

  html += '</div>';
  document.getElementById('productContainer').innerHTML = html;
}

renderProducts();
</script>

</body>
</html>
